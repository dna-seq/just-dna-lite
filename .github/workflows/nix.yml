name: Nix

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

jobs:
  test-nix:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-24.04-arm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build, install, and test
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            echo "--- uv sync ---"
            uv sync --all-packages --dev

            echo "--- import checks ---"
            uv run python -c "import just_dna_pipelines; print(\"just_dna_pipelines OK\")"
            uv run python -c "import webui; print(\"webui OK\")"

            echo "--- CLI check ---"
            uv run pipelines --help

            echo "--- tests ---"
            uv run --package just-dna-pipelines pytest just-dna-pipelines/tests/ -x -q
          '

  integration:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Annotate small VCF with longevitymap
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            uv sync --all-packages --dev

            echo "--- annotate antku_small.vcf ---"
            uv run pipelines annotate-modules \
                --vcf data/input/tests/antku_small.vcf \
                --user ci_test \
                --modules longevitymap

            echo "--- verify output ---"
            uv run python -c "
import polars as pl
from pathlib import Path

parquets = list(Path(\"data/output/users/ci_test\").rglob(\"*_weights.parquet\"))
assert len(parquets) >= 1, \"No weight parquet files found\"

df = pl.read_parquet(parquets[0])
assert df.height > 0, \"Empty annotation result\"
assert \"chrom\" in df.columns
assert \"start\" in df.columns
assert \"genotype\" in df.columns
print(f\"OK: {df.height} annotated variants in {parquets[0].name}\")

manifest = Path(\"data/output/users/ci_test\").rglob(\"manifest.json\")
assert any(manifest), \"No manifest.json found\"
print(\"OK: manifest.json present\")
"
          '
